<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Call Dialer | Connected</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ... (Styles omitted for brevity, keeping your original UI look) ... */
:root{--bg:#0d0f0e;--surface:#151817;--surface2:#1c1f1e;--border:#2a2e2c;--border2:#353a38;--accent:#00e87a;--adim:rgba(0,232,122,.10);--aglow:rgba(0,232,122,.22);--text:#e8ede9;--t2:#8a9490;--t3:#4d5652;--red:#ff4d4d;--amber:#f5a623;--blue:#4da6ff;--pink:#ff5ecf;--purple:#b388ff;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--row-h:36px}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.setup-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:var(--surface);border:1px solid var(--border);padding:40px;border-radius:12px;width:100%;max-width:500px;text-align:center}
input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:12px;border-radius:6px;font-family:var(--mono);margin:20px 0;outline:none}
input:focus{border-color:var(--accent)}
button{background:var(--accent);color:#000;border:none;padding:12px 24px;border-radius:6px;font-weight:600;cursor:pointer;font-family:var(--sans)}
button:hover{opacity:0.9}.hidden{display:none}
/* Minimal classes for the dialer UI consistency */
#main-ui{display:flex;flex-direction:column;height:100%}
.top-bar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.user-badge{font-family:var(--mono);font-size:12px;color:var(--t2)}
</style>
</head>
<body>

<div id="setup" class="setup-screen">
  <div class="setup-card">
    <h2>Connect to Sheet</h2>
    <p style="color:var(--t2); margin-top:10px;">Paste your Deployment URL below</p>
    <input type="text" id="script-url" placeholder="https://script.google.com/macros/s/.../exec">
    <button onclick="connect()">Connect & Start</button>
  </div>
</div>

<div id="main-ui" class="hidden">
  <div class="top-bar">
    <div class="user-badge" id="user-display">Connecting...</div>
    <div style="color:var(--accent); font-weight:600;">ACTIVE SESSION</div>
  </div>
  <div id="content" style="padding:40px; text-align:center;">
    <h1 id="lead-name">Loading Leads...</h1>
    <p id="lead-phone" style="font-family:var(--mono); font-size:24px; margin:20px 0;"></p>
    <button onclick="nextLead()">Next Lead (Down Arrow)</button>
  </div>
</div>

<script>
let state = {
  url: '',
  leads: [],
  index: 0
};

async function connect() {
  const urlInput = document.getElementById('script-url').value.trim();
  if (!urlInput) return alert("Please paste a URL");

  try {
    // We use GET here because your manual test proved it works
    const response = await fetch(`${urlInput}?action=getSheetData`);
    const result = await response.json();

    if (result.ok) {
      state.url = urlInput;
      state.leads = result.data;
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('main-ui').classList.remove('hidden');
      document.getElementById('user-display').textContent = result.user || 'Connected';
      renderLead();
    } else {
      alert("Error from script: " + result.error);
    }
  } catch (err) {
    console.error(err);
    alert("Could not reach the script. Ensure you are signed into Google in this browser and the URL is correct.");
  }
}

function renderLead() {
  if (state.leads.length === 0) return;
  const lead = state.leads[state.index];
  document.getElementById('lead-name').textContent = lead.company || lead.name || "No Name Found";
  document.getElementById('lead-phone').textContent = lead.phone || "No Phone Found";
}

function nextLead() {
  if (state.index < state.leads.length - 1) {
    state.index++;
    renderLead();
  }
}

// Handle Keyboard Down Arrow
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown') nextLead();
});
</script>
</body>
</html>

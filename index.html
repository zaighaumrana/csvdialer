<!DOCTYPE html>
<html>
<head>
    <title>Dialer Fix</title>
    <style>
        body { background: #0d0f0e; color: white; font-family: sans-serif; padding: 50px; text-align: center; }
        input { width: 300px; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #222; color: white; }
        button { padding: 10px 20px; background: #00e87a; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 20px; color: #888; font-family: monospace; }
    </style>
</head>
<body>
    <h2>Connect Dialer</h2>
    <input type="text" id="url" placeholder="Paste New Deployment URL">
    <button onclick="tryConnect()">Connect</button>
    <div id="log"></div>

    <script>
        // This function handles the data when it arrives from Google
        window.callback = function(response) {
            console.log("Data received:", response);
            if (response.ok) {
                document.getElementById('log').innerHTML = "<span style='color:#00e87a'>SUCCESS!</span> Received " + response.data.length + " leads.";
                // Here you would trigger your main UI
            } else {
                document.getElementById('log').textContent = "Error: " + response.error;
            }
        };

        function tryConnect() {
            const baseUrl = document.getElementById('url').value.trim();
            const log = document.getElementById('log');
            
            if (!baseUrl) return alert("Paste URL");
            log.textContent = "Requesting data...";

            // Instead of fetch(), we create a <script> tag. 
            // This is the only way to bypass 100% of CORS/Cookie blocks.
            const script = document.createElement('script');
            script.src = baseUrl + (baseUrl.includes('?') ? '&' : '?') + 'action=getSheetData';
            
            script.onerror = () => {
                log.innerHTML = "<span style='color:red'>Connection Failed.</span><br>Possible cause: The URL is incorrect or the script isn't shared.";
            };

            document.body.appendChild(script);
        }
    </script>
</body>
</html>
